; PoT-O Miner Firmware for ESP32-S and ESP8266
; https://pot.rpc.gateway.tribewarez.com

[platformio]
default_envs = esp32s

[common]
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0
    arduino-libraries/Arduino_CRC32@^1.0
build_flags =
    -DPOT_O_VERSION=\"1.0.0\"
    -DPOT_RPC_HOST=\"pot.rpc.gateway.tribewarez.com\"
    -DPOT_RPC_PORT=443
    -DPOT_RPC_TLS=1
    -DMAX_MINE_ITERATIONS=10000
    -DHEARTBEAT_INTERVAL_MS=30000

[env:esp32s]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = ${common.monitor_speed}
lib_deps = ${common.lib_deps}
build_flags =
    ${common.build_flags}
    -DESP32S_DEVICE=1
    -DMAX_TENSOR_DIM=64
    -DMAX_WORKING_MEM=327680
    -DNEURAL_LAYER_WIDTHS={32,16,8}

[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = ${common.monitor_speed}
lib_deps = ${common.lib_deps}
build_flags =
    ${common.build_flags}
    -DESP8266_DEVICE=1
    -DMAX_TENSOR_DIM=32
    -DMAX_WORKING_MEM=81920
    -DNEURAL_LAYER_WIDTHS={32,16,8}
